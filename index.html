<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 약, 잊지 마세요! 💊</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff; /* 밝은 배경색 */
            color: #333;
            text-align: center;
            padding: 20px;
            font-size: 18px; /* 큰 글자 */
        }
        h1 {
            font-size: 36px; /* 큰 제목 */
            margin-bottom: 40px;
        }
        .reminder-section {
            margin: 20px 0;
            font-size: 24px; /* 큰 글자 */
        }
        input[type="checkbox"] {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }
        input[type="text"] {
            font-size: 20px;
            padding: 10px;
            width: 300px;
            margin-left: 10px;
        }
        label {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>오늘의 약, 잊지 마세요! 💊</h1>
    
    <div class="reminder-section">
        <label>
            <input type="checkbox" id="morning">
            아침
        </label>
        <input type="text" id="morning-med" placeholder="약 이름을 입력하세요">
    </div>
    
    <div class="reminder-section">
        <label>
            <input type="checkbox" id="lunch">
            점심
        </label>
        <input type="text" id="lunch-med" placeholder="약 이름을 입력하세요">
    </div>
    
    <div class="reminder-section">
        <label>
            <input type="checkbox" id="evening">
            저녁
        </label>
        <input type="text" id="evening-med" placeholder="약 이름을 입력하세요">
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 아침
            const morningCheckbox = document.getElementById('morning');
            const morningInput = document.getElementById('morning-med');
            morningCheckbox.checked = localStorage.getItem('morning-checked') === 'true';
            morningInput.value = localStorage.getItem('morning-med') || '';
            morningCheckbox.addEventListener('change', function() {
                localStorage.setItem('morning-checked', this.checked);
            });
            morningInput.addEventListener('input', function() {
                localStorage.setItem('morning-med', this.value);
            });
            
            // 점심
            const lunchCheckbox = document.getElementById('lunch');
            const lunchInput = document.getElementById('lunch-med');
            lunchCheckbox.checked = localStorage.getItem('lunch-checked') === 'true';
            lunchInput.value = localStorage.getItem('lunch-med') || '';
            lunchCheckbox.addEventListener('change', function() {
                localStorage.setItem('lunch-checked', this.checked);
            });
            lunchInput.addEventListener('input', function() {
                localStorage.setItem('lunch-med', this.value);
            });
            
            // 저녁
            const eveningCheckbox = document.getElementById('evening');
            const eveningInput = document.getElementById('evening-med');
            eveningCheckbox.checked = localStorage.getItem('evening-checked') === 'true';
            eveningInput.value = localStorage.getItem('evening-med') || '';
            eveningCheckbox.addEventListener('change', function() {
                localStorage.setItem('evening-checked', this.checked);
            });
            eveningInput.addEventListener('input', function() {
                localStorage.setItem('evening-med', this.value);
            });
        });
    </script>
</body>
</html>
